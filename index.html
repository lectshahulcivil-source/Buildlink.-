<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildLink - Construction Supplier Notebook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-spinner { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .gradient-bg { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">

    <!-- Top Status Bar -->
    <div class="fixed top-4 right-4 z-50 bg-white p-3 rounded-2xl shadow-xl border border-gray-100 flex items-center space-x-3">
        <input id="apiKey" type="password" placeholder="Enter API Key..." class="text-sm p-2 w-40 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
        <div id="statusIndicator" class="w-4 h-4 rounded-full bg-gray-300 shadow-inner"></div>
    </div>

    <div class="max-w-3xl mx-auto">
        <header class="gradient-bg p-8 rounded-3xl shadow-lg mb-8 text-white">
            <h1 class="text-3xl font-extrabold mb-2">BuildLink 🏗️</h1>
            <p class="opacity-90 text-sm">Your intelligent construction procurement partner.</p>
        </header>

        <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Select Location</label>
                <select id="location" class="w-full p-4 border rounded-2xl bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none">
                    <option>Riyadh</option>
                    <option>Jeddah</option>
                    <option>Dammam</option>
                    <option>Khobar</option>
                    <option>Makkah</option>
                    <option>Madinah</option>
                </select>
            </div>

            <div>
                <div class="flex space-x-2 mb-4 bg-gray-100 p-1 rounded-xl">
                    <button id="matTab" onclick="setTab('material')" class="tab-btn flex-1 py-3 rounded-lg font-semibold transition text-gray-600">Materials</button>
                    <button id="eqTab" onclick="setTab('equipment')" class="tab-btn flex-1 py-3 rounded-lg font-semibold transition text-gray-600">Equipment</button>
                    <button id="manTab" onclick="setTab('manpower')" class="tab-btn flex-1 py-3 rounded-lg font-semibold transition text-gray-600">Manpower</button>
                </div>
                <div id="categoryGrid" class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <!-- Category buttons appear here -->
                </div>
            </div>
        </div>

        <div id="results" class="mt-8 space-y-4">
            <!-- Results will appear here -->
        </div>
    </div>

    <script>
        let tab = "material";
        
        function updateStatus(isSuccess) {
            const indicator = document.getElementById("statusIndicator");
            indicator.className = `w-4 h-4 rounded-full shadow-inner ${isSuccess ? 'bg-green-500' : 'bg-red-400'}`;
        }

        const categoryData = {
            material: ["Brick", "Cement", "Steel Rebar", "Wood/Timber", "Tiles", "Concrete", "Paint"],
            equipment: ["Excavator", "Crane", "Bulldozer", "Generator", "Mixer", "Scaffolding", "Forklift"],
            manpower: ["Helper", "Operator", "Engineer", "Carpenter", "Skilled Trades"]
        };

        window.onload = () => setTab('material');

        function setTab(t) {
            tab = t;
            document.querySelectorAll('.tab-btn').forEach(el => {
                const isActive = (el.id === 'matTab' && t === 'material') || (el.id === 'eqTab' && t === 'equipment') || (el.id === 'manTab' && t === 'manpower');
                el.classList.toggle('bg-white', isActive);
                el.classList.toggle('text-blue-600', isActive);
                el.classList.toggle('shadow-sm', isActive);
            });

            const grid = document.getElementById("categoryGrid");
            grid.innerHTML = categoryData[t].map(item => `
                <button onclick="searchSuppliers('${item}')" class="p-4 bg-white border border-gray-100 rounded-2xl hover:border-blue-300 hover:shadow-md transition text-sm font-medium text-gray-700">
                    ${item}
                </button>
            `).join('');
        }

        async function searchSuppliers(category) {
            const container = document.getElementById("results");
            const location = document.getElementById("location").value;
            const apiKey = document.getElementById("apiKey").value;
            
            if (!apiKey) {
                container.innerHTML = `<div class="p-6 bg-yellow-50 text-yellow-700 rounded-3xl border border-yellow-200">Please enter your API Key in the top right to start searching.</div>`;
                return;
            }
            
            container.innerHTML = `<div class="flex justify-center p-10"><div class="loading-spinner w-10 h-10 border-4 border-gray-200 rounded-full"></div></div>`;

            // Updated to use the requested gemini-2.5-flash model
            const prompt = `Find 5 ${tab === 'manpower' ? 'agencies/recruitment providers' : 'suppliers'} for ${category} in ${location}, Saudi Arabia. Return ONLY valid JSON array with keys: name, phone, email, website, google_maps_link, estimated_cost. Ensure estimated_cost includes currency in SAR.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const result = await response.json();
                
                if (result.error) {
                    throw new Error(result.error.message);
                }

                const rawText = result.candidates[0].content.parts[0].text;
                const cleanJson = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
                const json = JSON.parse(cleanJson);

                updateStatus(true);

                container.innerHTML = `<h2 class="text-xl font-bold mb-4 text-gray-800">Results for ${category}</h2>` + json.map(item => `
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 hover:shadow-md transition">
                        <h3 class="text-lg font-bold text-gray-900 mb-1">${item.name}</h3>
                        <p class="text-blue-600 font-bold mb-4 flex items-center">
                            <span class="mr-2">💰</span> ${item.estimated_cost}
                        </p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm text-gray-600">
                            <p class="bg-gray-50 p-2 rounded-lg">📞 ${item.phone}</p>
                            <p class="bg-gray-50 p-2 rounded-lg">📧 ${item.email}</p>
                            <a href="${item.website}" class="text-blue-600 font-medium hover:underline p-2" target="_blank">🌐 Visit Website</a>
                            <a href="${item.google_maps_link}" class="text-blue-600 font-medium hover:underline p-2" target="_blank">📍 Open in Maps</a>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                updateStatus(false);
                container.innerHTML = `<div class="p-6 bg-red-50 text-red-700 rounded-3xl border border-red-200"><strong>API Error:</strong> ${e.message}</div>`;
            }
        }
    </script>
</body>
</html>
